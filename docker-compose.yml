services:
  traefik:
    image: traefik:v3.0
    command:
      - --api.insecure=true
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    restart: always
    networks:
      - web

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always
    networks:
      - web
      - internal

  app:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "npm install && npm start"
    restart: always
    networks:
      - internal

networks:
  web:
  internal:
